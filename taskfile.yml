# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GREETING: Hello, world!

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  sum:
    desc: runs repomix
    cmds:
      - repomix --include "**/*.go" --ignore "ui,docs" --output "./docs/goodies.xml"
